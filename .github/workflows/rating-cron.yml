name: Update App Ratings

on:
  schedule:
    - cron: '12 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest App Store rating snapshot
        env:
          APPLE_APP_ID: ${{ secrets.APPLE_APP_ID }}
        run: node ./scripts/fetch-rating.mjs

      - name: Commit and push ratings.json if changed
        run: |
          if git diff --quiet -- ratings.json; then
            echo "No ratings.json changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ratings.json
          git commit -m "chore(data): update ratings snapshot"
          git push
